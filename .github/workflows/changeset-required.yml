name: changeset-required

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

jobs:
  check:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'skip changeset') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect package source changes
        id: detect
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -qE '^packages/[^/]+/src/'; then
            echo "needs=1" >> "$GITHUB_OUTPUT"
          else
            echo "needs=0" >> "$GITHUB_OUTPUT"
          fi
      - name: Require changeset
        if: steps.detect.outputs.needs == '1'
        run: |
          if ! git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -qE '^\.changeset/.+\.md$'; then
            echo "Package source changed without a changeset. Add one or apply the 'skip changeset' label."
            exit 1
          fi
