}

function persist() { try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch (e) {} }
function clearPersist() { localStorage.removeItem(LS_KEY); }

function setStatus(msg) { document.getElementById("status").textContent = msg; }

function render() {
  const main = document.getElementById("main");
  main.innerHTML = "";
  let total = 0, answered = 0, chatMore = 0;
  for (const sec of state.sections) {
    const det = document.createElement("details");
    det.className = "section";
    det.open = true;
    const sum = document.createElement("summary");
    const sAns = sec.questions.filter(q => q.answer).length;
    const sCm = sec.questions.filter(q => q.chat_more && q.chat_more.trim()).length;
    sum.innerHTML = `<h2>${escape(sec.title)}</h2><span class="section-meta">${sAns}/${sec.questions.length} answered${sCm ? " · " + sCm + " chat-more" : ""}</span>`;
    det.appendChild(sum);
    const grid = document.createElement("div");
    grid.className = "grid";
    for (const q of sec.questions) {
      total++;
      if (q.answer) answered++;
      if (q.chat_more && q.chat_more.trim()) chatMore++;
      grid.appendChild(renderCard(q));
    }
    det.appendChild(grid);
    main.appendChild(det);
  }
  state.stats = { total, answered, chat_more: chatMore, remaining: total - answered };
  document.getElementById("s-total").textContent = total;
  document.getElementById("s-answered").textContent = answered;
  document.getElementById("s-remaining").textContent = total - answered;
  document.getElementById("s-chatmore").textContent = chatMore;
  document.getElementById("bar").style.width = (total ? Math.round(100 * answered / total) : 0) + "%";
}

function renderCard(q) {
  const card = document.createElement("div");
  card.className = "card" + (q.answer ? " answered" : "");
  const head = document.createElement("div");
  head.className = "card-head";
  head.innerHTML = `<span class="badge">${q.id}</span><h3>${escape(q.title)}</h3>`;
  card.appendChild(head);
  const ctx = document.createElement("div");
  ctx.className = "ctx";
  ctx.innerHTML = formatContext(q.context);
  card.appendChild(ctx);
  const opts = document.createElement("div");
  opts.className = "options";
  for (const o of q.options) {
    const lab = document.createElement("label");
    lab.className = "opt";
    const radio = document.createElement("input");
    radio.type = "radio";
    radio.name = q.id;
    radio.value = o.id;
    if (q.answer === o.id) radio.checked = true;
    radio.addEventListener("change", () => {
      q.answer = o.id;
      q.status = "answered";
      persist();
      render();
    });
    lab.appendChild(radio);
    const txt = document.createElement("div");
    txt.className = "opt-text";
    txt.innerHTML = `<div class="opt-label">${escape(o.label)}</div>` + (o.description ? `<div class="opt-desc">${escape(o.description)}</div>` : "");
    lab.appendChild(txt);
    opts.appendChild(lab);
  }
  card.appendChild(opts);
  const ta = document.createElement("textarea");
  ta.placeholder = "Add context, nuance, or clarification (optional)…";
  ta.value = q.chat_more || "";
  if (ta.value.trim()) ta.classList.add("has-content");
  ta.addEventListener("input", () => {
    q.chat_more = ta.value;
    if (ta.value.trim()) ta.classList.add("has-content"); else ta.classList.remove("has-content");
    if (!q.answer && q.chat_more.trim()) q.status = "chat-more";
    persist();
    render();
  });
  card.appendChild(ta);
  return card;
}

function formatContext(s) {
  if (!s) return "";
  return escape(s).replace(/`([^`]+)`/g, '<code>$1</code>');
}
function escape(s) { return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c])); }

async function saveState() {
  const text = JSON.stringify(state, null, 2);
  if (window.showSaveFilePicker) {
    try {
      const handle = await window.showSaveFilePicker({ suggestedName: JSON_FILE, types: [{ description: "JSON", accept: { "application/json": [".json"] } }] });
      const w = await handle.createWritable();
      await w.write(text);
      await w.close();
      setStatus("Saved via File System Access API");
      return;
    } catch (e) { /* fall through to download */ }
  }
  const blob = new Blob([text], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = JSON_FILE;
  a.click();
  URL.revokeObjectURL(a.href);
  setStatus("Downloaded " + JSON_FILE + " — replace the original on disk, then tell Claude 'refresh'.");
}

document.getElementById("save").addEventListener("click", saveState);
document.getElementById("save2").addEventListener("click", saveState);
document.getElementById("reload").addEventListener("click", () => {
  if (confirm("Discard browser-stored answers and reload the embedded state?")) {
    clearPersist();
    loadState();
  }
});

loadState();
</script>
