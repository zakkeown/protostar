function render() {
  const pd = document.getElementById("priorDecisions");
  const decisions = STATE.prior_decisions || {};
  let pdHtml = '<h2>Locked from prior phases / constraints</h2><ul>';
  for (const [k, v] of Object.entries(decisions)) {
    if (k === "code_landmarks") continue;
    pdHtml += `<li><code>${k}</code>: ${escapeHtml(String(v))}</li>`;
  }
  if (decisions.code_landmarks) {
    pdHtml += '</ul><h2 style="margin-top:10px;">Code landmarks</h2><ul>';
    for (const lm of decisions.code_landmarks) {
      pdHtml += `<li>${escapeHtml(lm)}</li>`;
    }
  }
  pdHtml += "</ul>";
  pd.innerHTML = pdHtml;

  const root = document.getElementById("sections");
  root.innerHTML = "";
  for (const section of STATE.sections) {
    const answered = section.questions.filter(q => q.answer !== null && q.answer !== "").length;
    const total = section.questions.length;
    const det = document.createElement("details");
    det.className = "section";
    det.open = true;
    const sum = document.createElement("summary");
    sum.innerHTML = `<span>${escapeHtml(section.title)}</span><span class="count ${answered === total ? 'full' : ''}">${answered}/${total} answered</span>`;
    det.appendChild(sum);
    const grid = document.createElement("div");
    grid.className = "grid";
    for (const q of section.questions) {
      grid.appendChild(renderCard(q));
    }
    det.appendChild(grid);
    root.appendChild(det);
  }
  updateStats();
}

function renderCard(q) {
  const card = document.createElement("div");
  card.className = "card" + (q.answer ? " answered" : "");
  card.dataset.qid = q.id;

  const header = document.createElement("div");
  header.className = "card-header";
  header.innerHTML = `<h3 class="card-title">${escapeHtml(q.title)}</h3><span class="badge">${q.id}</span>`;
  card.appendChild(header);

  if (q.context) {
    const ctx = document.createElement("div");
    ctx.className = "context";
    ctx.textContent = q.context;
    card.appendChild(ctx);
  }

  const opts = document.createElement("div");
  opts.className = "options";
  for (const opt of q.options) {
    const lbl = document.createElement("label");
    lbl.className = "option" + (q.answer === opt.id ? " selected" : "");
    lbl.innerHTML = `
      <input type="radio" name="${q.id}" value="${opt.id}" ${q.answer === opt.id ? "checked" : ""} />
      <div class="option-body">
        <div class="option-label">${escapeHtml(opt.label)}</div>
        ${opt.description ? `<div class="option-desc">${escapeHtml(opt.description)}</div>` : ""}
      </div>
    `;
    lbl.querySelector("input").addEventListener("change", (e) => {
      q.answer = e.target.value;
      q.status = "answered";
      render();
    });
    opts.appendChild(lbl);
  }
  card.appendChild(opts);

  const ta = document.createElement("textarea");
  ta.placeholder = "Add context, nuance, or clarification for this question...";
  ta.value = q.chat_more || "";
  if (ta.value) ta.classList.add("has-content");
  ta.addEventListener("input", (e) => {
    q.chat_more = e.target.value;
    e.target.classList.toggle("has-content", !!e.target.value);
    if (q.chat_more && !q.answer) q.status = "chat-more";
    updateStats();
  });
  card.appendChild(ta);

  return card;
}

function updateStats() {
  let answered = 0, chatMore = 0, total = 0;
  for (const s of STATE.sections) {
    for (const q of s.questions) {
      total++;
      if (q.answer !== null && q.answer !== "") answered++;
      if (q.chat_more) chatMore++;
    }
  }
  STATE.stats.total = total;
  STATE.stats.answered = answered;
  STATE.stats.chat_more = chatMore;
  STATE.stats.remaining = total - answered;
  document.getElementById("totalPill").textContent = `${total} total`;
  document.getElementById("answeredPill").textContent = `${answered} answered`;
  document.getElementById("remainingPill").textContent = `${total - answered} remaining`;
  document.getElementById("chatMorePill").textContent = `${chatMore} chat-more`;
  document.getElementById("progressFill").style.width = (total > 0 ? (answered / total) * 100 : 0) + "%";
}

function saveAnswers() {
  const text = JSON.stringify(STATE, null, 2);
  const blob = new Blob([text], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "09-QUESTIONS.json";
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

(async () => {
  await loadState();
  render();
})();
</script>
